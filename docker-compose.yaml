services:
  postgres:
      image: postgres:18-bookworm
      container_name: fin_tracker
      ports:
        - "5432:5432"
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        POSTGRES_DB: fin_tracker
      volumes:
        - pgdata:/var/lib/postgresql
      healthcheck:
        test: [ "CMD-SHELL", "pg_isready -U postgres" ]
        interval: 5s
        timeout: 5s
        retries: 5

  app:
    build: .
    container_name: fin_tracker_app
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@postgres:5432/fin_tracker?sslmode=disable

volumes:
  pgdata: